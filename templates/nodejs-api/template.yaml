apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nodejs-api
  title: Node.js API (Express)
  description: >-
    Cria uma API Node.js com Express, Dockerfile pronto para produção e um
    pipeline de CI/CD (GitHub Actions) que builda e publica a imagem no
    Google Artifact Registry.
  tags:
    - nodejs
    - express
    - recommended
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Informações da aplicação
      required:
        - appName
        - description
        - owner
        - port
      properties:
        appName:
          title: Nome da aplicação
          type: string
          description: Nome único do componente (ex. customer-api)
          pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'
          ui:autofocus: true
          ui:help: 'Use apenas letras minúsculas, números e hífens.'
        description:
          title: Descrição
          type: string
          description: O que essa aplicação faz
        owner:
          title: Owner / Time responsável
          type: string
          description: Time dono do serviço (ex. backend-team)
          default: backend-team
        port:
          title: Porta da aplicação
          type: number
          description: Porta em que a API vai escutar
          default: 8080

    - title: Localização do repositório
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repositório
          type: string
          description: Organização e nome do repositório que será criado no GitHub
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: Gerar projeto a partir do skeleton
      action: fetch:template
      input:
        url: ./skeleton
        copyWithoutTemplating:
          - .github/workflows/**
        values:
          appName: ${{ parameters.appName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          port: ${{ parameters.port }}
          repoUrl: ${{ parameters.repoUrl }}

    - id: publish
      name: Criar repositório no GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private

    - id: register
      name: Registrar no catálogo do Backstage
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

    - id: notify
      name: Notificar
      action: notification:send
      input:
        recipients: entity
        entityRefs:
          - user:default/guest
        title: 'Template Node.js API executado'
        info: 'O repositório ${{ parameters.appName }} foi criado e registrado no catálogo.'
        severity: 'normal'

  output:
    links:
      - title: Repositório
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Abrir no catálogo
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
