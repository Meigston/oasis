apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: gcp-cloudsql
  title: Banco de dados no GCP (Cloud SQL)
  description: >-
    Cria um repositório que provisiona uma instância Cloud SQL (PostgreSQL ou
    MySQL) no Google Cloud usando gcloud via GitHub Actions — sem Terraform.
    O provisionamento é idempotente e disparado manualmente (workflow_dispatch).
  tags:
    - gcp
    - database
    - cloud-sql
    - infrastructure
spec:
  owner: user:guest
  type: resource

  parameters:
    - title: Identificação
      required:
        - resourceName
        - description
        - owner
      properties:
        resourceName:
          title: Nome do recurso
          type: string
          description: Nome único do recurso no catálogo (ex. customer-db)
          pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'
          ui:autofocus: true
        description:
          title: Descrição
          type: string
          description: Para que serve esse banco
        owner:
          title: Owner / Time responsável
          type: string
          default: backend-team

    - title: Configuração do Cloud SQL
      required:
        - instanceName
        - databaseVersion
        - region
        - tier
        - databaseName
      properties:
        instanceName:
          title: Nome da instância
          type: string
          description: Nome da instância Cloud SQL (ex. customer-sql)
          pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'
        databaseVersion:
          title: Engine / versão
          type: string
          description: Versão do banco no Cloud SQL
          default: POSTGRES_16
          enum:
            - POSTGRES_16
            - POSTGRES_15
            - MYSQL_8_0
          enumNames:
            - PostgreSQL 16
            - PostgreSQL 15
            - MySQL 8.0
        region:
          title: Região
          type: string
          description: Região do GCP (ex. us-central1)
          default: us-central1
        tier:
          title: Tier / máquina
          type: string
          description: Tier da instância (ex. db-f1-micro para PoC)
          default: db-f1-micro
        databaseName:
          title: Nome do banco
          type: string
          description: Banco criado dentro da instância (ex. appdb)
          default: appdb
          pattern: '^[a-zA-Z0-9_]+$'

    - title: Localização do repositório
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repositório
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: Gerar repositório a partir do skeleton
      action: fetch:template
      input:
        url: ./skeleton
        copyWithoutTemplating:
          - .github/workflows/**
        values:
          resourceName: ${{ parameters.resourceName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          instanceName: ${{ parameters.instanceName }}
          databaseVersion: ${{ parameters.databaseVersion }}
          region: ${{ parameters.region }}
          tier: ${{ parameters.tier }}
          databaseName: ${{ parameters.databaseName }}
          repoUrl: ${{ parameters.repoUrl }}

    - id: publish
      name: Criar repositório no GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private

    - id: register
      name: Registrar no catálogo do Backstage
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

    - id: notify
      name: Notificar
      action: notification:send
      input:
        recipients: entity
        entityRefs:
          - user:default/guest
        title: 'Template Cloud SQL executado'
        info: >-
          Repositório ${{ parameters.resourceName }} criado. Rode o workflow
          "Provision Cloud SQL" (Actions) para provisionar o banco.
        severity: 'normal'

  output:
    links:
      - title: Repositório
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Abrir no catálogo
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
